<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monstersknow - Combat Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #ff6b6b;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            margin-bottom: 20px;
        }

        .canvas-container {
            background: rgba(255,255,255,0.05);
            border: 2px solid #ff6b6b;
            border-radius: 8px;
            padding: 10px;
            height: 600px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0f3460, #1a5f7a);
            border-radius: 4px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: rgba(255,255,255,0.08);
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 15px;
        }

        .panel h3 {
            color: #ff6b6b;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button {
            background: #ff6b6b;
            color: #1a1a2e;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 12px;
        }

        button:hover {
            background: #ff8585;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .turn-counter {
            font-size: 18px;
            font-weight: bold;
            color: #ff6b6b;
            text-align: center;
        }

        .status-inactive {
            color: #888;
        }

        .entity-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 12px;
        }

        .entity-item {
            background: rgba(255, 107, 107, 0.1);
            border-left: 3px solid #ff6b6b;
            padding: 8px;
            border-radius: 3px;
        }

        .entity-name {
            font-weight: bold;
            color: #fff;
        }

        .entity-health {
            margin-top: 4px;
            color: #ccc;
        }

        .health-bar {
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
            margin-top: 4px;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .log-container {
            grid-column: 1 / -1;
            background: rgba(255,255,255,0.08);
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .log-container h3 {
            color: #ff6b6b;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
        }

        #combatLog {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .log-entry {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 5px;
            padding: 4px 8px;
            border-left: 2px solid #ff6b6b;
            padding-left: 8px;
            transition: all 0.2s;
        }

        .log-entry:hover {
            background: rgba(255, 107, 107, 0.1);
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            canvas {
                height: 400px;
            }
        }

        .dead {
            opacity: 0.5;
        }

        .hidden {
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ MONSTERSKNOW ⚔️</h1>

        <div class="main-grid">
            <div class="canvas-container">
                <canvas id="combatCanvas"></canvas>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <div class="turn-counter" id="turnCounter">Turn: --</div>
                </div>

                <div class="panel">
                    <h3>Controls</h3>
                    <div class="button-group">
                        <button onclick="startCombat()">Start Combat</button>
                        <button onclick="nextTurn()">Next Turn</button>
                        <button onclick="auto5Turns()">Auto 5 Turns</button>
                        <button onclick="auto10Turns()">Auto 10 Turns</button>
                        <button onclick="autoSequence()">Auto Sequence</button>
                        <button onclick="resetCombat()">Reset</button>
                    </div>
                    <div style="margin-top: 15px;">
                        <label for="stepSlider" style="font-size: 12px; color: #aaa;">Step Delay:</label>
                        <input type="range" id="stepSlider" min="50" max="500" value="100" 
                               style="width: 100%; cursor: pointer;">
                        <div style="font-size: 10px; color: #888; text-align: center;" id="stepLabel">100ms</div>
                    </div>
                    <div style="margin-top: 10px;">
                        <label for="speedSlider" style="font-size: 12px; color: #aaa;">Turn Delay:</label>
                        <input type="range" id="speedSlider" min="100" max="1500" value="600" 
                               style="width: 100%; cursor: pointer;">
                        <div style="font-size: 10px; color: #888; text-align: center;" id="speedLabel">600ms</div>
                    </div>
                </div>

                <div class="panel">
                    <h3>Spawn Entity</h3>
                    <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                        <input type="number" id="spawnX" placeholder="X" min="0" max="800" value="100" 
                               style="flex: 1; padding: 6px; border-radius: 3px; border: 1px solid #ff6b6b; background: rgba(255,255,255,0.1); color: #fff;">
                        <input type="number" id="spawnY" placeholder="Y" min="0" max="600" value="100" 
                               style="flex: 1; padding: 6px; border-radius: 3px; border: 1px solid #ff6b6b; background: rgba(255,255,255,0.1); color: #fff;">
                    </div>
                    <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                        <select id="entityType" style="flex: 1; padding: 6px; border-radius: 3px; border: 1px solid #ff6b6b; background: rgba(255,255,255,0.1); color: #fff;">
                            <option value="goblin">Goblin</option>
                            <option value="hobgoblin">Hobgoblin</option>
                            <option value="bugbear">Bugbear</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                        <select id="entityAi" style="flex: 1; padding: 6px; border-radius: 3px; border: 1px solid #ff6b6b; background: rgba(255,255,255,0.1); color: #fff;">
                            <option value="">Default AI</option>
                        </select>
                    </div>
                    <button onclick="spawnEntity()" style="width: 100%;">Spawn Entity</button>
                </div>

                <div class="panel">
                    <h3>Combatants</h3>
                    <div class="entity-list" id="entityList"></div>
                </div>
            </div>
        </div>

        <div class="log-container">
            <h3>Combat Log</h3>
            <div id="combatLog"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('combatCanvas');
        const ctx = canvas.getContext('2d');
        let currentCombatData = null;
        let terrain = []; // Store terrain features
        let isSimulating = false; // Track if simulation is running
        let turnDelay = 600; // Delay in milliseconds between turns
        let stepDelay = 100; // Delay in milliseconds between steps (for animation)
        let animatedEntity = null; // Currently animating entity data
        let animationSteps = []; // Array of animation steps to perform

        // Grid settings - 5 feet per square (D&D standard)
        const GRID_SIZE = 40; // pixels per 5-foot square
        const FEET_PER_SQUARE = 5;
        const PIXELS_PER_FOOT = GRID_SIZE / FEET_PER_SQUARE;

        // Terrain feature definitions
        const TERRAIN_FEATURES = [
            { type: 'rock', x: 100, y: 150, size: 40, hideBonus: 3 },
            { type: 'rock', x: 300, y: 250, size: 50, hideBonus: 3 },
            { type: 'tree', x: 400, y: 100, size: 35, hideBonus: 4 },
            { type: 'tree', x: 500, y: 350, size: 35, hideBonus: 4 },
            { type: 'shadow', x: 150, y: 400, size: 80, hideBonus: 5 },
            { type: 'shadow', x: 450, y: 200, size: 100, hideBonus: 5 },
            { type: 'bush', x: 200, y: 300, size: 25, hideBonus: 2 },
            { type: 'bush', x: 550, y: 150, size: 25, hideBonus: 2 },
        ];

        // Resize canvas
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 20;
            canvas.height = rect.height - 20;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        async function startCombat() {
            try {
                const response = await fetch('/api/combat/start', { method: 'POST' });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                currentCombatData = await response.json();
                updateUI();
            } catch (error) {
                console.error('Error starting combat:', error);
                alert('Error starting combat: ' + error.message);
            }
        }

        async function nextTurn() {
            try {
                if (!currentCombatData) {
                    alert('Please start combat first!');
                    return;
                }
                const response = await fetch('/api/combat/turn', { method: 'POST' });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const newData = await response.json();
                
                // Animate movement for entities that moved
                if (currentCombatData && currentCombatData.entities) {
                    for (let i = 0; i < currentCombatData.entities.length; i++) {
                        const oldEntity = currentCombatData.entities[i];
                        const newEntity = newData.entities[i];
                        
                        if (oldEntity && newEntity && 
                            (oldEntity.posX !== newEntity.posX || oldEntity.posY !== newEntity.posY)) {
                            // Entity moved - animate the movement
                            await animateMovement(oldEntity, newEntity);
                        }
                    }
                }
                
                currentCombatData = newData;
                updateUI();
            } catch (error) {
                console.error('Error executing turn:', error);
                alert('Error executing turn: ' + error.message);
            }
        }

        async function animateMovement(oldEntity, newEntity) {
            const startX = oldEntity.posX;
            const startY = oldEntity.posY;
            const endX = newEntity.posX;
            const endY = newEntity.posY;
            
            const dx = endX - startX;
            const dy = endY - startY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            // Calculate number of steps (one per foot of movement)
            // Each foot is PIXELS_PER_FOOT pixels
            const steps = Math.ceil(distance / PIXELS_PER_FOOT);
            
            for (let step = 1; step <= steps; step++) {
                await sleep(stepDelay);
                
                // Linear interpolation for smooth movement
                const progress = step / steps;
                const currentX = startX + dx * progress;
                const currentY = startY + dy * progress;
                
                // Temporarily update for drawing
                const tempEntity = { ...oldEntity, posX: currentX, posY: currentY };
                
                // Redraw with updated position
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Draw background
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#1a4d6d');
                gradient.addColorStop(1, '#0a2540');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw terrain
                drawTerrain();
                
                // Draw all entities with animated one
                if (currentCombatData && currentCombatData.entities) {
                    currentCombatData.entities.forEach(entity => {
                        if (entity.id === oldEntity.id) {
                            drawEntity(tempEntity);
                        } else {
                            drawEntity(entity);
                        }
                    });
                }
                
                // Draw grid
                drawGrid();
            }
        }

        async function auto5Turns() {
            try {
                if (!currentCombatData) {
                    alert('Please start combat first!');
                    return;
                }
                isSimulating = true;
                disableButtons(true);
                
                // Execute 5 turns with animation between each
                for (let i = 0; i < 5 && currentCombatData; i++) {
                    await sleep(turnDelay);
                    await nextTurn();
                }
                
                disableButtons(false);
                isSimulating = false;
            } catch (error) {
                console.error('Error executing turns:', error);
                alert('Error executing turns: ' + error.message);
                disableButtons(false);
                isSimulating = false;
            }
        }

        async function auto10Turns() {
            try {
                if (!currentCombatData) {
                    alert('Please start combat first!');
                    return;
                }
                isSimulating = true;
                disableButtons(true);
                
                // Execute 10 turns with animation between each
                for (let i = 0; i < 10 && currentCombatData; i++) {
                    await sleep(turnDelay);
                    await nextTurn();
                }
                
                disableButtons(false);
                isSimulating = false;
            } catch (error) {
                console.error('Error executing turns:', error);
                alert('Error executing turns: ' + error.message);
                disableButtons(false);
                isSimulating = false;
            }
        }

        async function autoSequence() {
            try {
                if (!currentCombatData) {
                    alert('Please start combat first!');
                    return;
                }
                isSimulating = true;
                disableButtons(true);
                
                // Continue executing turns until combat is over
                let isActive = true;
                while (isActive && currentCombatData) {
                    const activeResponse = await fetch('/api/combat/active');
                    isActive = await activeResponse.json();
                    
                    if (isActive) {
                        await sleep(turnDelay);
                        await nextTurn();
                    }
                }
                
                disableButtons(false);
                isSimulating = false;
                alert('Combat has ended!');
            } catch (error) {
                console.error('Error in auto sequence:', error);
                alert('Error in auto sequence: ' + error.message);
                disableButtons(false);
                isSimulating = false;
            }
        }

        async function loadAiList() {
            try {
                const response = await fetch('/api/ai/list');
                const aiNames = await response.json();
                const select = document.getElementById('entityAi');
                const selected = select.value;
                select.innerHTML = '<option value="">Default AI</option>';
                aiNames.forEach(name => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    select.appendChild(option);
                });
                select.value = selected;
            } catch (error) {
                console.error('Error loading AI list:', error);
            }
        }

        async function spawnEntity() {
            try {
                const x = parseInt(document.getElementById('spawnX').value);
                const y = parseInt(document.getElementById('spawnY').value);
                const type = document.getElementById('entityType').value;
                const aiName = document.getElementById('entityAi').value;

                if (isNaN(x) || isNaN(y)) {
                    alert('Please enter valid coordinates');
                    return;
                }

                // Make request to spawn entity
                const response = await fetch('/api/combat/spawn', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        type: type,
                        posX: x,
                        posY: y,
                        aiName: aiName
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                currentCombatData = await response.json();
                updateUI();
            } catch (error) {
                console.error('Error spawning entity:', error);
                alert('Error spawning entity: ' + error.message);
            }
        }

        function disableButtons(disabled) {
            document.querySelectorAll('button').forEach(btn => {
                btn.disabled = disabled;
                if (disabled) {
                    btn.style.opacity = '0.5';
                    btn.style.cursor = 'not-allowed';
                } else {
                    btn.style.opacity = '1';
                    btn.style.cursor = 'pointer';
                }
            });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function resetCombat() {
            try {
                const response = await fetch('/api/combat/reset', { method: 'POST' });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                currentCombatData = null;
                updateUI();
            } catch (error) {
                console.error('Error resetting combat:', error);
                alert('Error resetting combat: ' + error.message);
            }
        }

        function updateUI() {
            updateTurnCounter();
            updateEntityList();
            updateCombatLog();
            drawCombatMap();
        }

        function updateTurnCounter() {
            const element = document.getElementById('turnCounter');
            if (currentCombatData && currentCombatData.turnNumber !== undefined) {
                element.textContent = `Turn: ${currentCombatData.turnNumber}`;
                element.classList.remove('status-inactive');
            } else {
                element.textContent = 'Turn: --';
                element.classList.add('status-inactive');
            }
        }

        function updateEntityList() {
            const list = document.getElementById('entityList');
            list.innerHTML = '';
            if (!currentCombatData || !currentCombatData.entities) return;

            currentCombatData.entities.forEach(entity => {
                const healthPercent = (entity.currentHealth / entity.maxHealth) * 100;
                const div = document.createElement('div');
                div.className = 'entity-item' + (entity.hidden ? ' hidden' : '') + (entity.alive ? '' : ' dead');
                div.innerHTML = `
                    <div class="entity-name">${entity.name}</div>
                    <div class="entity-health">HP: ${entity.currentHealth}/${entity.maxHealth}</div>
                    <div class="health-bar">
                        <div class="health-fill" style="width: ${healthPercent}%"></div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function updateCombatLog() {
            const logDiv = document.getElementById('combatLog');
            logDiv.innerHTML = '';
            if (!currentCombatData || !currentCombatData.log) return;

            // Show only the last 15 entries for clarity
            const recentEntries = currentCombatData.log.slice(-15);
            
            recentEntries.forEach((entry, index) => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                // Highlight the last entry
                if (index === recentEntries.length - 1) {
                    div.style.backgroundColor = 'rgba(255, 107, 107, 0.2)';
                    div.style.fontWeight = 'bold';
                }
                div.textContent = entry;
                logDiv.appendChild(div);
            });
            
            // Auto-scroll to bottom
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function drawCombatMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background
            ctx.fillStyle = 'linear-gradient(to bottom, #0f3460, #1a5f7a)';
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a4d6d');
            gradient.addColorStop(1, '#0a2540');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw walls/borders at screen boundaries
            drawBoundaries();

            // Draw terrain features
            drawTerrain();

            // Draw entities
            if (currentCombatData && currentCombatData.entities) {
                currentCombatData.entities.forEach(entity => {
                    drawEntity(entity);
                });
            }

            // Draw grid (subtle)
            drawGrid();
        }

        function drawBoundaries() {
            // Draw thick border around the battlefield
            const borderWidth = 3;
            const borderColor = '#ff6b6b';
            
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = borderWidth;
            ctx.globalAlpha = 0.6;
            
            // Draw rectangle border
            ctx.strokeRect(borderWidth/2, borderWidth/2, 
                          canvas.width - borderWidth, canvas.height - borderWidth);
            
            // Add corner decorations (stone blocks)
            ctx.globalAlpha = 0.8;
            ctx.fillStyle = '#4a4a4a';
            const cornerSize = 15;
            
            // Top-left
            ctx.fillRect(0, 0, cornerSize, cornerSize);
            // Top-right
            ctx.fillRect(canvas.width - cornerSize, 0, cornerSize, cornerSize);
            // Bottom-left
            ctx.fillRect(0, canvas.height - cornerSize, cornerSize, cornerSize);
            // Bottom-right
            ctx.fillRect(canvas.width - cornerSize, canvas.height - cornerSize, cornerSize, cornerSize);
            
            ctx.globalAlpha = 1;
        }

        function drawTerrain() {
            TERRAIN_FEATURES.forEach(feature => {
                const x = (feature.x % canvas.width + canvas.width) % canvas.width;
                const y = (feature.y % canvas.height + canvas.height) % canvas.height;

                switch(feature.type) {
                    case 'rock':
                        drawRock(x, y, feature.size);
                        break;
                    case 'tree':
                        drawTree(x, y, feature.size);
                        break;
                    case 'shadow':
                        drawShadow(x, y, feature.size);
                        break;
                    case 'bush':
                        drawBush(x, y, feature.size);
                        break;
                }
            });
        }

        function drawRock(x, y, size) {
            // Draw rock with shading
            ctx.fillStyle = '#5a5a5a';
            ctx.beginPath();
            ctx.ellipse(x, y, size * 0.7, size * 0.5, 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Highlight
            ctx.fillStyle = 'rgba(100, 100, 100, 0.4)';
            ctx.beginPath();
            ctx.ellipse(x - size * 0.2, y - size * 0.1, size * 0.3, size * 0.2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Border
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.ellipse(x, y, size * 0.7, size * 0.5, 0.2, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawTree(x, y, size) {
            // Trunk
            ctx.fillStyle = '#3d2817';
            ctx.fillRect(x - size * 0.15, y, size * 0.3, size * 0.8);

            // Foliage
            ctx.fillStyle = '#2d5016';
            ctx.beginPath();
            ctx.arc(x, y - size * 0.3, size * 0.6, 0, Math.PI * 2);
            ctx.fill();

            // Darker foliage for depth
            ctx.fillStyle = '#1d3d0f';
            ctx.beginPath();
            ctx.arc(x - size * 0.2, y - size * 0.1, size * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawShadow(x, y, size) {
            // Dark area representing shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.beginPath();
            ctx.ellipse(x, y, size * 0.8, size * 0.6, 0.1, 0, Math.PI * 2);
            ctx.fill();

            // Edge gradient
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.ellipse(x, y, size * 0.8, size * 0.6, 0.1, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawBush(x, y, size) {
            // Bush - spiky appearance
            ctx.fillStyle = '#4a6b2f';
            ctx.beginPath();
            ctx.arc(x, y, size * 0.8, 0, Math.PI * 2);
            ctx.fill();

            // Lighter bush edges
            ctx.fillStyle = '#6d9f3f';
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 / 8) * i;
                const px = x + Math.cos(angle) * size * 0.6;
                const py = y + Math.sin(angle) * size * 0.6;
                ctx.beginPath();
                ctx.arc(px, py, size * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.lineWidth = 1;

            // Draw vertical lines
            for (let x = 0; x < canvas.width; x += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            // Draw horizontal lines
            for (let y = 0; y < canvas.height; y += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Draw grid coordinates every 5 squares (25 feet)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.font = '9px Arial';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'bottom';
            
            for (let x = 0; x < canvas.width; x += GRID_SIZE * 5) {
                for (let y = 0; y < canvas.height; y += GRID_SIZE * 5) {
                    const feet = Math.round((x / PIXELS_PER_FOOT) / 5) * 5;
                    ctx.fillText(feet + "'", x - 2, y - 2);
                }
            }
        }

        function drawEntity(entity) {
            const x = (entity.posX % canvas.width + canvas.width) % canvas.width;
            const y = (entity.posY % canvas.height + canvas.height) % canvas.height;
            const radius = 12;

            // Draw shadow beneath entity
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.ellipse(x, y + radius + 2, radius * 1.2, radius * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();

            // Draw entity circle with color based on type
            if (entity.hidden) {
                // Hidden - very transparent with outline only
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = '#88ccff';
            } else {
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#ff6b6b';
            }

            if (!entity.alive) {
                ctx.globalAlpha = 0.5;
                ctx.fillStyle = '#888';
            }
            
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.globalAlpha = 1;

            // Draw border
            ctx.strokeStyle = entity.hidden ? '#88ccff' : '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.stroke();

            // Draw health indicator bar
            const barWidth = radius * 2.5;
            const barHeight = 4;
            const healthPercent = entity.currentHealth / entity.maxHealth;

            // Background bar
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(x - barWidth / 2, y + radius + 6, barWidth, barHeight);

            // Health bar
            ctx.fillStyle = healthPercent > 0.3 ? '#4caf50' : '#ff6b6b';
            ctx.fillRect(x - barWidth / 2, y + radius + 6, barWidth * healthPercent, barHeight);

            // Health border
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.strokeRect(x - barWidth / 2, y + radius + 6, barWidth, barHeight);

            // Draw name
            ctx.fillStyle = entity.hidden ? '#88ccff' : '#fff';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(entity.name.substring(0, 3), x, y);

            // Draw hidden indicator
            if (entity.hidden) {
                ctx.fillStyle = '#88ccff';
                ctx.font = 'bold 8px Arial';
                ctx.fillText('⊙', x, y + radius + 16);
            }
        }

        // Initial draw
        updateUI();
        loadAiList();

        // Speed slider handler
        document.getElementById('speedSlider').addEventListener('input', function() {
            turnDelay = parseInt(this.value);
            const speedLabel = document.getElementById('speedLabel');
            speedLabel.textContent = turnDelay + 'ms';
        });

        // Step slider handler
        document.getElementById('stepSlider').addEventListener('input', function() {
            stepDelay = parseInt(this.value);
            const stepLabel = document.getElementById('stepLabel');
            stepLabel.textContent = stepDelay + 'ms';
        });
    </script>
</body>
</html>
